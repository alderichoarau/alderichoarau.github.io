sonar.projectKey=alderichoarau_alderichoarau.github.io
sonar.organization=alderichoarau

# Sources
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.exclusions=\
  **/node_modules/**,\
  **/*.spec.ts,\
  **/coverage/**,\
  **/dist/**,\
  **/docs/**,\
  **/*.config.ts,\
  **/test-setup.ts,\
  **/environments/**,\
  **/main.ts

# Coverage — generated by Vitest (lcov format)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.sourceEncoding=UTF-8
