<section id="experience" class="experience-section">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-label">
        <mat-icon>timeline</mat-icon>
        {{ 'experience.title' | translate }}
      </span>
    </div>

    <div class="timeline">
      @for (exp of experiences; track exp; let i = $index; let last = $last) {
        <div class="timeline-entry" [class.last]="last">
          <!-- Ligne verticale + point -->
          <div class="timeline-axis">
            <div class="timeline-dot">
              <mat-icon>{{ exp.icon }}</mat-icon>
            </div>
            @if (!last) {
              <div class="timeline-line"></div>
            }
          </div>

          <!-- Contenu -->
          <div class="timeline-body">
            <div class="entry-period">{{ exp.period | translate }}</div>
            <h3 class="entry-title">{{ exp.title | translate }}</h3>
            <p class="entry-desc">{{ exp.description | translate }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
