<section id="references" class="references-section">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-label">
        <mat-icon>business</mat-icon>
        {{ 'references.title' | translate }}
      </span>
      <p class="section-subtitle">{{ 'references.subtitle' | translate }}</p>
    </div>

    <div class="references-container">
      <div class="references-track" [style.animation-play-state]="isHovered ? 'paused' : 'running'">
        @for (ref of references; track ref.name) {
          <div class="reference-item" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
            <img [src]="ref.logo" [alt]="ref.name" class="reference-logo" />
          </div>
        }
        @for (ref of references; track ref.name + '_dup') {
          <div
            class="reference-item"
            aria-hidden="true"
            (mouseenter)="onMouseEnter()"
            (mouseleave)="onMouseLeave()"
          >
            <img [src]="ref.logo" [alt]="ref.name" class="reference-logo" />
          </div>
        }
      </div>
    </div>
  </div>
</section>
