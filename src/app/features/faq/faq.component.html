<section id="faq" class="faq-section">
  <div class="section-inner">
    <div class="section-header">
      <span class="section-label">
        <mat-icon>help_outline</mat-icon>
        {{ 'faq.title' | translate }}
      </span>
      <p class="section-subtitle">{{ 'faq.subtitle' | translate }}</p>
    </div>

    <mat-accordion class="faq-accordion" multi="false">
      @for (faq of faqs(); track trackByFAQ(i, faq); let i = $index) {
        <mat-expansion-panel
          class="faq-panel"
          [expanded]="expandedIndex() === i"
          (opened)="expandedIndexSignal.set(i)"
          (closed)="expandedIndexSignal.set(null)"
        >
          <mat-expansion-panel-header class="faq-header">
            <mat-panel-title class="faq-question">
              <span class="q-number">{{ i + 1 }}</span>
              <span class="q-text">{{ faq.question | translate }}</span>
            </mat-panel-title>
          </mat-expansion-panel-header>
          <div class="faq-answer">
            <p>{{ faq.answer | translate }}</p>
          </div>
        </mat-expansion-panel>
      }
    </mat-accordion>
  </div>
</section>
